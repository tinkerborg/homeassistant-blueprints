blueprint:
  name: Litter Robot Alerts — Inovelli LED
  description: >
    Show alerts on one or more Inovelli White Series 2-1 (VTM31-SN, Matter)
    switches based on Litter-Robot state:
      * Drawer-full alert: waste drawer is above the "full" threshold.
      * Error alert: status sensor matches one of the configured error states
        (e.g. "Cycle Interrupted" when stuck mid-cycle).


    Each alert has its own selectable color and effect type. When neither
    condition is active, the LED bar returns to its normal load-level
    indicator.


    Priority: drawer-full takes precedence over error.


    Reconciliation:
      * Drawer alert toggles on the start/stop thresholds (hysteresis).
      * Error alert follows the status sensor directly.
      * On HA restart, the current sensor values are re-evaluated and the LED
        is set accordingly.
      * When you first save this automation, run it once from the automation
        page ("Run actions") to apply the current state.


    Requires VTM31-SN firmware 1.1.0 or later (effect select entity must exist).
  domain: automation
  homeassistant:
    min_version: 2024.6.0
  input:
    waste_drawer_sensor:
      name: Litter Robot waste-drawer sensor
      description: The % sensor exposed by the Litter Robot integration.
      selector:
        entity:
          domain: sensor
          integration: litterrobot
    full_threshold:
      name: Start drawer-full alert when above this %
      description: >
        Home Assistant's numeric_state "above" is exclusive — set this to 99
        to start at 100%, 89 to start at 90%+, etc.
      default: 99
      selector:
        number:
          min: 50
          max: 99
          step: 1
          unit_of_measurement: "%"
    stop_threshold:
      name: Stop drawer-full alert when below this %
      description: Drawer must drop strictly below this value for the alert to clear.
      default: 50
      selector:
        number:
          min: 0
          max: 99
          step: 1
          unit_of_measurement: "%"
    full_color:
      name: Drawer-full color
      description: LED color while the drawer-full alert is active.
      default: [255, 0, 0]
      selector:
        color_rgb:
    full_effect_type:
      name: Drawer-full effect type
      description: Which animation the LED bar runs while the drawer is full.
      default: Fast Blink
      selector:
        select:
          options:
            - Solid
            - Fast Blink
            - Middle Blink
            - Slow Blink
            - Fast Chase
            - Middle Chase
            - Slow Chase
            - Fast Siren
            - Slow Siren
            - Open Close
            - Small To Big
    robot_vacuum:
      name: Litter Robot vacuum entity
      description: >
        The vacuum entity created by the Litter Robot integration. Its state
        becomes "error" for any error condition (stuck mid-cycle, cat sensor
        fault, etc.) — used as a generic error signal.
      selector:
        entity:
          domain: vacuum
          integration: litterrobot
    error_color:
      name: Error color
      description: LED color while the error alert is active.
      default: [255, 128, 0]
      selector:
        color_rgb:
    error_effect_type:
      name: Error effect type
      description: Which animation the LED bar runs while the robot is in an error state.
      default: Slow Blink
      selector:
        select:
          options:
            - Solid
            - Fast Blink
            - Middle Blink
            - Slow Blink
            - Fast Chase
            - Middle Chase
            - Slow Chase
            - Fast Siren
            - Slow Siren
            - Open Close
            - Small To Big
    inovelli_devices:
      name: Inovelli VTM31-SN switches
      description: >
        Pick one or more White Series 2-1 switches. Only select VTM31-SN
        devices — the picker also shows other Matter devices.
      selector:
        device:
          integration: matter
          multiple: true
    brightness_pct:
      name: LED brightness (%)
      default: 80
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: "%"

mode: restart
max_exceeded: silent

trigger:
  - platform: numeric_state
    entity_id: !input waste_drawer_sensor
    above: !input full_threshold
    id: drawer_full
  - platform: numeric_state
    entity_id: !input waste_drawer_sensor
    below: !input stop_threshold
    id: drawer_emptied
  - platform: state
    entity_id: !input robot_vacuum
    id: vacuum_state_changed
  - platform: homeassistant
    event: start

variables:
  waste_drawer_sensor: !input waste_drawer_sensor
  full_threshold: !input full_threshold
  stop_threshold: !input stop_threshold
  robot_vacuum: !input robot_vacuum
  inovelli_devices: !input inovelli_devices
  full_color: !input full_color
  full_effect_type: !input full_effect_type
  error_color: !input error_color
  error_effect_type: !input error_effect_type
  brightness_pct: !input brightness_pct
  current_drawer: "{{ states(waste_drawer_sensor) | float(0) }}"
  is_vacuum_error: "{{ states(robot_vacuum) == 'error' }}"
  effect_color_lights: >-
    {% set out = namespace(items=[]) %}
    {% for d in inovelli_devices %}
      {% for ent in device_entities(d) %}
        {% if ent.startswith('light.')
              and ent in integration_entities('matter')
              and 'color_temp' in (state_attr(ent, 'supported_color_modes') or []) %}
          {% set out.items = out.items + [ent] %}
        {% endif %}
      {% endfor %}
    {% endfor %}
    {{ out.items }}
  effect_selects: >-
    {% set out = namespace(items=[]) %}
    {% for d in inovelli_devices %}
      {% for ent in device_entities(d) %}
        {% set opts = state_attr(ent, 'options') or [] %}
        {% if ent.startswith('select.')
              and ent in integration_entities('matter')
              and 'solid' in (opts | map('lower') | list) %}
          {% set out.items = out.items + [ent] %}
        {% endif %}
      {% endfor %}
    {% endfor %}
    {{ out.items }}

action:
  - choose:
      # Drawer crossed the start threshold — show drawer-full alert.
      - conditions:
          - condition: trigger
            id: drawer_full
        sequence:
          - repeat:
              for_each: "{{ effect_color_lights }}"
              sequence:
                - service: light.turn_on
                  data:
                    entity_id: "{{ repeat.item }}"
                    brightness_pct: "{{ brightness_pct }}"
                    rgb_color: "{{ full_color }}"
          - repeat:
              for_each: "{{ effect_selects }}"
              sequence:
                - service: select.select_option
                  data:
                    entity_id: "{{ repeat.item }}"
                    option: "{{ full_effect_type }}"

      # Drawer dropped below the stop threshold — fall back to error alert or clear.
      - conditions:
          - condition: trigger
            id: drawer_emptied
        sequence:
          - choose:
              - conditions: "{{ is_vacuum_error }}"
                sequence:
                  - repeat:
                      for_each: "{{ effect_color_lights }}"
                      sequence:
                        - service: light.turn_on
                          data:
                            entity_id: "{{ repeat.item }}"
                            brightness_pct: "{{ brightness_pct }}"
                            rgb_color: "{{ error_color }}"
                  - repeat:
                      for_each: "{{ effect_selects }}"
                      sequence:
                        - service: select.select_option
                          data:
                            entity_id: "{{ repeat.item }}"
                            option: "{{ error_effect_type }}"
            default:
              - repeat:
                  for_each: "{{ effect_color_lights }}"
                  sequence:
                    - service: light.turn_off
                      data:
                        entity_id: "{{ repeat.item }}"

      # Vacuum state changed — apply error alert unless drawer-full is active.
      - conditions:
          - condition: trigger
            id: vacuum_state_changed
        sequence:
          - choose:
              # Drawer-full has priority — don't override.
              - conditions: "{{ current_drawer > full_threshold }}"
                sequence: []
              # Vacuum is now in error — show error alert.
              - conditions: "{{ is_vacuum_error }}"
                sequence:
                  - repeat:
                      for_each: "{{ effect_color_lights }}"
                      sequence:
                        - service: light.turn_on
                          data:
                            entity_id: "{{ repeat.item }}"
                            brightness_pct: "{{ brightness_pct }}"
                            rgb_color: "{{ error_color }}"
                  - repeat:
                      for_each: "{{ effect_selects }}"
                      sequence:
                        - service: select.select_option
                          data:
                            entity_id: "{{ repeat.item }}"
                            option: "{{ error_effect_type }}"
              # Vacuum cleared an error and drawer isn't full — turn off.
              - conditions:
                  - "{{ trigger.from_state is not none }}"
                  - "{{ trigger.from_state.state == 'error' }}"
                sequence:
                  - repeat:
                      for_each: "{{ effect_color_lights }}"
                      sequence:
                        - service: light.turn_off
                          data:
                            entity_id: "{{ repeat.item }}"

    # HA start or manual "Run actions" — reconcile from current sensor values.
    default:
      - choose:
          - conditions: "{{ current_drawer > full_threshold }}"
            sequence:
              - repeat:
                  for_each: "{{ effect_color_lights }}"
                  sequence:
                    - service: light.turn_on
                      data:
                        entity_id: "{{ repeat.item }}"
                        brightness_pct: "{{ brightness_pct }}"
                        rgb_color: "{{ full_color }}"
              - repeat:
                  for_each: "{{ effect_selects }}"
                  sequence:
                    - service: select.select_option
                      data:
                        entity_id: "{{ repeat.item }}"
                        option: "{{ full_effect_type }}"
          - conditions: "{{ is_vacuum_error }}"
            sequence:
              - repeat:
                  for_each: "{{ effect_color_lights }}"
                  sequence:
                    - service: light.turn_on
                      data:
                        entity_id: "{{ repeat.item }}"
                        brightness_pct: "{{ brightness_pct }}"
                        rgb_color: "{{ error_color }}"
              - repeat:
                  for_each: "{{ effect_selects }}"
                  sequence:
                    - service: select.select_option
                      data:
                        entity_id: "{{ repeat.item }}"
                        option: "{{ error_effect_type }}"
          - conditions: "{{ current_drawer < stop_threshold }}"
            sequence:
              - repeat:
                  for_each: "{{ effect_color_lights }}"
                  sequence:
                    - service: light.turn_off
                      data:
                        entity_id: "{{ repeat.item }}"
