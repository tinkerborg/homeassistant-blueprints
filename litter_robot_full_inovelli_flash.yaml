blueprint:
  name: Litter Robot Full — Blink Inovelli LED Red (continuous)
  description: >
    While the Litter-Robot waste drawer is above the "start" threshold, blink
    the LED bar red on one or more Inovelli White Series 2-1 (VTM31-SN, Matter)
    switches. When the drawer drops below the "stop" threshold, clear the
    effect and the LED bar returns to its normal load-level indicator.


    Reconciliation:
      * Blinks start when the drawer crosses above the start threshold.
      * Blinks stop when the drawer falls below the stop threshold.
      * On Home Assistant restart, the current sensor value is re-evaluated
        and the blink is started or cleared as appropriate.
      * When you first save this automation, the existing drawer state isn't
        evaluated automatically — run it once from the automation page
        ("Run actions") to apply the current state. After that, the triggers
        keep it in sync.


    Requires VTM31-SN firmware 1.1.0 or later (effect select entity must exist).
  domain: automation
  homeassistant:
    min_version: 2024.6.0
  input:
    waste_drawer_sensor:
      name: Litter Robot waste-drawer sensor
      description: The % sensor exposed by the Litter Robot integration.
      selector:
        entity:
          domain: sensor
          integration: litterrobot
    full_threshold:
      name: Start blinking when above this %
      description: >
        Home Assistant's numeric_state "above" is exclusive — set this to 99
        to start at 100%, 89 to start at 90%+, etc.
      default: 99
      selector:
        number:
          min: 50
          max: 99
          step: 1
          unit_of_measurement: "%"
    stop_threshold:
      name: Stop blinking when below this %
      description: Drawer must drop strictly below this value for the blink to clear.
      default: 50
      selector:
        number:
          min: 0
          max: 99
          step: 1
          unit_of_measurement: "%"
    inovelli_devices:
      name: Inovelli VTM31-SN switches
      description: >
        Pick one or more White Series 2-1 switches. Only select VTM31-SN
        devices — the picker also shows other Matter devices.
      selector:
        device:
          integration: matter
          multiple: true
    effect_type:
      name: Effect type
      description: Which animation the LED bar runs while the drawer is full.
      default: Fast Blink
      selector:
        select:
          options:
            - Solid
            - Fast Blink
            - Middle Blink
            - Slow Blink
            - Fast Chase
            - Middle Chase
            - Slow Chase
            - Fast Siren
            - Slow Siren
            - Open Close
            - Small To Big
    brightness_pct:
      name: LED brightness (%)
      default: 80
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: "%"

mode: restart
max_exceeded: silent

trigger:
  - platform: numeric_state
    entity_id: !input waste_drawer_sensor
    above: !input full_threshold
    id: drawer_full
  - platform: numeric_state
    entity_id: !input waste_drawer_sensor
    below: !input stop_threshold
    id: drawer_emptied
  - platform: homeassistant
    event: start

variables:
  inovelli_devices: !input inovelli_devices
  effect_type: !input effect_type
  brightness_pct: !input brightness_pct
  effect_color_lights: >-
    {% set out = namespace(items=[]) %}
    {% for d in inovelli_devices %}
      {% for ent in device_entities(d) %}
        {% if ent.startswith('light.')
              and ent in integration_entities('matter')
              and 'color_temp' in (state_attr(ent, 'supported_color_modes') or []) %}
          {% set out.items = out.items + [ent] %}
        {% endif %}
      {% endfor %}
    {% endfor %}
    {{ out.items }}
  effect_selects: >-
    {% set out = namespace(items=[]) %}
    {% for d in inovelli_devices %}
      {% for ent in device_entities(d) %}
        {% set opts = state_attr(ent, 'options') or [] %}
        {% if ent.startswith('select.')
              and ent in integration_entities('matter')
              and 'solid' in (opts | map('lower') | list) %}
          {% set out.items = out.items + [ent] %}
        {% endif %}
      {% endfor %}
    {% endfor %}
    {{ out.items }}

action:
  - choose:
      # Drawer crossed the start threshold — start the blink.
      - conditions:
          - condition: trigger
            id: drawer_full
        sequence:
          - repeat:
              for_each: "{{ effect_color_lights }}"
              sequence:
                - service: light.turn_on
                  data:
                    entity_id: "{{ repeat.item }}"
                    brightness_pct: "{{ brightness_pct }}"
                    hs_color: [0, 100]
          - repeat:
              for_each: "{{ effect_selects }}"
              sequence:
                - service: select.select_option
                  data:
                    entity_id: "{{ repeat.item }}"
                    option: "{{ effect_type }}"

      # Drawer dropped below the stop threshold — clear the effect.
      - conditions:
          - condition: trigger
            id: drawer_emptied
        sequence:
          - repeat:
              for_each: "{{ effect_color_lights }}"
              sequence:
                - service: light.turn_off
                  data:
                    entity_id: "{{ repeat.item }}"

    # HA start or manual "Run actions" — reconcile based on current sensor value.
    default:
      - choose:
          - conditions:
              - condition: numeric_state
                entity_id: !input waste_drawer_sensor
                above: !input full_threshold
            sequence:
              - repeat:
                  for_each: "{{ effect_color_lights }}"
                  sequence:
                    - service: light.turn_on
                      data:
                        entity_id: "{{ repeat.item }}"
                        brightness_pct: "{{ brightness_pct }}"
                        hs_color: [0, 100]
              - repeat:
                  for_each: "{{ effect_selects }}"
                  sequence:
                    - service: select.select_option
                      data:
                        entity_id: "{{ repeat.item }}"
                        option: "{{ effect_type }}"
          - conditions:
              - condition: numeric_state
                entity_id: !input waste_drawer_sensor
                below: !input stop_threshold
            sequence:
              - repeat:
                  for_each: "{{ effect_color_lights }}"
                  sequence:
                    - service: light.turn_off
                      data:
                        entity_id: "{{ repeat.item }}"
